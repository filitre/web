    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILICON | Home</title>
    <meta name="description" content="Moderní digitální studio FILICON.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 10%; position: sticky; top: 0; backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .hero { text-align: center; padding: 8rem 10%; }
        .hero h1 { font-size: 4rem; margin-bottom: 1.5rem; }
        .hero span { color: var(--primary); }
        .btn { display: inline-block; padding: 1rem 2.5rem; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; text-decoration: none; border-radius: 50px; font-weight: 600; transition: 0.3s; border: none; cursor: pointer; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        footer { text-align: center; padding: 4rem; opacity: 0.6; }
    </style>
</head>

        <li><a href="kontakt.html">Kontakt</a></li>
    </ul>
</nav>
<section class="hero">
    <h1>Vytvoříme Vám <span>web</span> na míru.</h1>
    <p style="font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.8;">Firma zaměřená na webové aplikace s moderním designem.</p>
    <a href="sluzby.html" class="btn">Prohlédnout služby</a>
</section>
<footer>&copy; 2026 FILICON.</footer>
